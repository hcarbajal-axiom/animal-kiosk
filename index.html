<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animal Expert - Panda Kiosk</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        #container {
            display: grid;
            grid-template-rows: auto 1fr;
            gap: 2rem;
            max-width: 900px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        #canvas-container {
            background: linear-gradient(135deg, #e8f4f8 0%, #d4e9f0 100%);
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas { max-width: 100%; height: auto; }
        #controls {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            padding: 2rem;
            overflow-y: auto;
            max-height: 500px;
        }
        .control-section {
            background: #f8f9fa;
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid #e9ecef;
        }
        .control-section h3 {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 12px;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            transition: transform 0.2s;
        }
        button:hover { transform: translateY(-2px); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        button.secondary { background: #e9ecef; color: #333; }
        #response {
            background: #e7f5ff;
            border-left: 4px solid #667eea;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            color: #333;
            display: none;
            max-height: 120px;
            overflow-y: auto;
        }
        .status-line {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #666;
            margin-top: 12px;
            padding: 8px 12px;
            background: #f1f3f5;
            border-radius: 6px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #51cf66;
            animation: pulse 2s ease-in-out infinite;
        }
        .status-dot.processing { background: #ffa94d; }
        .status-dot.error { background: #ff6b6b; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .toggle-switch {
            width: 50px;
            height: 28px;
            background: #ccc;
            border-radius: 14px;
            cursor: pointer;
            position: relative;
        }
        .toggle-switch.active { background: #667eea; }
        .toggle-knob {
            position: absolute;
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 12px;
            top: 2px;
            left: 2px;
            transition: all 0.3s;
        }
        .toggle-switch.active .toggle-knob { left: 24px; }
    </style>
</head>
<body>
    <div id="container">
        <div id="canvas-container">
            <canvas id="canvas"></canvas>
        </div>
        
        <div id="controls">
            <div class="control-section">
                <h3>🎙️ Microphone</h3>
                <div style="display: flex; align-items: center; gap: 12px; justify-content: space-between;">
                    <span style="font-size: 12px; color: #666;" id="mic-status">OFF</span>
                    <div class="toggle-switch" id="mic-toggle">
                        <div class="toggle-knob"></div>
                    </div>
                </div>
                <div class="status-line">
                    <div class="status-dot" id="status-dot"></div>
                    <span id="status-text">Ready</span>
                </div>
            </div>
            
            <div class="control-section">
                <h3>🦁 Ask About Animals</h3>
                <input type="text" id="question-input" placeholder="Ask about animals...">
                <button id="ask-btn">Send & Speak</button>
                <button class="secondary" id="stop-btn" style="display: none;">⏹️ Stop</button>
            </div>
            
            <div class="control-section">
                <h3>📢 Response</h3>
                <div id="response"></div>
            </div>
        </div>
    </div>

    <script>
        const BACKEND_URL = "https://node-express--hcarbajal.replit.app";
        const VOICE_ID = "si0svtk05vPEuvwAW93c";
        
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 500;
        canvas.height = 400;
        
        let isSpeaking = false;
        let microphoneEnabled = false;
        let recognition = null;
        let frameCount = 0;
        let currentAudio = null;
        
        class PandaAvatar {
            constructor() {
                this.x = canvas.width / 2;
                this.y = canvas.height / 2;
                this.state = 'happy';
            }
            draw(mouthOpen) {
                // Face
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(this.x, this.y, 100, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // Ears
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(this.x - 70, this.y - 80, 30, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(this.x + 70, this.y - 80, 30, 0, Math.PI * 2);
                ctx.fill();
                
                // Eye patches
                ctx.beginPath();
                ctx.ellipse(this.x - 40, this.y - 20, 25, 35, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(this.x + 40, this.y - 20, 25, 35, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // Eyes
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(this.x - 40, this.y - 25, 12, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(this.x + 40, this.y - 25, 12, 0, Math.PI * 2);
                ctx.fill();
                
                // Pupils
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(this.x - 40, this.y - 25, 8, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(this.x + 40, this.y - 25, 8, 0, Math.PI * 2);
                ctx.fill();
                
                // Nose
                ctx.beginPath();
                ctx.arc(this.x, this.y + 15, 10, 0, Math.PI * 2);
                ctx.fill();
                
                // Mouth
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 3;
                ctx.fillStyle = '#333';
                
                if (isSpeaking) {
                    if (mouthOpen) {
                        ctx.beginPath();
                        ctx.ellipse(this.x, this.y + 55, 20, 30, 0, 0, Math.PI * 2);
                        ctx.fill();
                    } else {
                        ctx.beginPath();
                        ctx.moveTo(this.x - 20, this.y + 55);
                        ctx.lineTo(this.x + 20, this.y + 55);
                        ctx.stroke();
                    }
                } else {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y + 50, 25, 0, Math.PI);
                    ctx.stroke();
                }
            }
        }
        
        const avatar = new PandaAvatar();
        
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            frameCount++;
            
            if (!isSpeaking) {
                avatar.x = canvas.width / 2 + Math.sin(frameCount * 0.02) * 8;
            } else {
                avatar.x = canvas.width / 2;
            }
            
            const mouthOpen = Math.floor((frameCount % 30) / 15) === 1;
            avatar.draw(mouthOpen);
            requestAnimationFrame(animate);
        }
        animate();
        
        // Mic toggle
        document.getElementById('mic-toggle').addEventListener('click', () => {
            microphoneEnabled = !microphoneEnabled;
            const toggle = document.getElementById('mic-toggle');
            
            if (microphoneEnabled) {
                toggle.classList.add('active');
                document.getElementById('mic-status').textContent = 'ON';
                updateStatus('Listening...', 'processing');
                if (recognition) recognition.start();
            } else {
                toggle.classList.remove('active');
                document.getElementById('mic-status').textContent = 'OFF';
                updateStatus('Ready', 'idle');
                if (recognition) recognition.stop();
            }
        });
        
        document.getElementById('question-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') askQuestion();
        });
        
        document.getElementById('ask-btn').addEventListener('click', askQuestion);
        document.getElementById('stop-btn').addEventListener('click', () => {
            if (currentAudio) currentAudio.pause();
            isSpeaking = false;
            document.getElementById('stop-btn').style.display = 'none';
            updateStatus('Stopped', 'idle');
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && e.target === document.body) {
                e.preventDefault();
                document.getElementById('mic-toggle').click();
            }
        });
        
        // Speech Recognition
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.lang = 'en-US';
            
            recognition.onresult = (event) => {
                if (!microphoneEnabled) return;
                let transcript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    transcript += event.results[i][0].transcript;
                }
                document.getElementById('question-input').value = transcript;
                if (event.results[event.results.length - 1].isFinal) {
                    setTimeout(askQuestion, 300);
                }
            };
        }
        
        async function askQuestion() {
            const question = document.getElementById('question-input').value.trim();
            if (!question || isSpeaking) return;
            
            isSpeaking = true;
            updateStatus('Processing...', 'processing');
            document.getElementById('ask-btn').disabled = true;
            document.getElementById('stop-btn').style.display = 'block';
            
            try {
                const res = await fetch(`${BACKEND_URL}/api/claude/v1/messages`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: 'claude-opus-4-5',
                        max_tokens: 1024,
                        messages: [{ role: 'user', content: question }]
                    }),
                });
                
                if (!res.ok) throw new Error(`Backend error: ${res.status}`);
                
                const data = await res.json();
                const response = data.content[0].text;
                
                document.getElementById('response').textContent = response;
                document.getElementById('response').style.display = 'block';
                updateStatus('Speaking...', 'processing');
                
                // Get voice
                const audioRes = await fetch(`${BACKEND_URL}/api/elevenlabs/v1/text-to-speech/${VOICE_ID}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: response })
                });
                
                if (!audioRes.ok) throw new Error(`TTS error: ${audioRes.status}`);
                
                const audioBlob = await audioRes.blob();
                const audioUrl = URL.createObjectURL(audioBlob);
                currentAudio = new Audio(audioUrl);
                currentAudio.play();
                
                await new Promise(resolve => {
                    currentAudio.onended = resolve;
                    currentAudio.onerror = resolve;
                });
                
                isSpeaking = false;
                document.getElementById('stop-btn').style.display = 'none';
                updateStatus('Done!', 'idle');
                
            } catch (error) {
                console.error(error);
                document.getElementById('response').textContent = 'Error: ' + error.message;
                document.getElementById('response').style.display = 'block';
                updateStatus('Error', 'error');
                isSpeaking = false;
            }
            
            document.getElementById('ask-btn').disabled = false;
        }
        
        function updateStatus(text, type = 'idle') {
            document.getElementById('status-text').textContent = text;
            const dot = document.getElementById('status-dot');
            dot.className = 'status-dot';
            if (type === 'processing') dot.classList.add('processing');
            else if (type === 'error') dot.classList.add('error');
        }
    </script>
</body>
</html>
